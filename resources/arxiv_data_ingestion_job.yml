resources:
  jobs:
    arxiv_data_ingestion_job:
      name: arxiv_data_ingestion
      tags:
        project_name: "arxiv-curator"

      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              - ../dist/*.whl

      tasks:
        - task_key: arxiv_data_ingestion
          environment_key: default
          notebook_task:
            notebook_path: ../notebooks/1.3_arxiv_data_ingestion.py
            base_parameters:
              env: ${bundle.target}
              git_sha: "${var.git_sha}"
              run_id: "{{job.run_id}}"
